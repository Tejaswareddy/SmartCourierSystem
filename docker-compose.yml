services:

  mysql:
    image: mariadb:10.11
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # messaging
      - "15672:15672" # dashboard

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    depends_on:
      - eureka-server

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - mysql

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
    environment:
      SERVER_PORT: 8090
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PORT: 8090
      EUREKA_INSTANCE_NONSECUREPORT: 8090

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8081
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_PORT: 8081
      EUREKA_INSTANCE_NONSECUREPORT: 8081

  delivery-service:
    build: ./delivery-service
    container_name: delivery-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq   # ✅ IMPORTANT
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delivery_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq   # ✅ IMPORTANT
      SERVER_PORT: 8082
      EUREKA_INSTANCE_HOSTNAME: delivery-service
      EUREKA_INSTANCE_PORT: 8082
      EUREKA_INSTANCE_NONSECUREPORT: 8082

  tracking-service:
    build: ./tracking-service
    container_name: tracking-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq   # ✅ IMPORTANT
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tracking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq   # ✅ IMPORTANT
      SERVER_PORT: 8083
      EUREKA_INSTANCE_HOSTNAME: tracking-service
      EUREKA_INSTANCE_PORT: 8083
      EUREKA_INSTANCE_NONSECUREPORT: 8083

  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/admin_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8084
      EUREKA_INSTANCE_HOSTNAME: admin-service
      EUREKA_INSTANCE_PORT: 8084
      EUREKA_INSTANCE_NONSECUREPORT: 8084

  sonarqube-db:
    image: postgres:13
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      - sonarqube-db
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  mysql_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: