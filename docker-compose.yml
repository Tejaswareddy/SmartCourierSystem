services:

  # 🔹 MySQL Database (MariaDB)
  mysql:
    image: mariadb:10.11              # Uses MariaDB image (MySQL compatible)
    container_name: mysql            # Container name
    restart: always                  # Automatically restart if container stops
    environment:
      MYSQL_ROOT_PASSWORD: root      # Root password for DB
    ports:
      - "3307:3306"                  # Host:Container (access DB on localhost:3307)
    volumes:
      - mysql_data:/var/lib/mysql    # Persistent DB storage (VERY IMPORTANT)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  
      # Runs SQL file automatically when container starts (DB initialization)

  # 🔹 RabbitMQ (Message Broker for async communication)
  rabbitmq:
    image: rabbitmq:3-management     # Includes management UI
    container_name: rabbitmq
    ports:
      - "5672:5672"                 # Port for messaging (used by services)
      - "15672:15672"               # Web dashboard (http://localhost:15672)

  # 🔹 Zipkin (Distributed tracing)
  zipkin:
    image: openzipkin/zipkin        # Zipkin image
    container_name: zipkin
    ports:
      - "9411:9411"                # Access Zipkin UI (http://localhost:9411)
    environment:
      - STORAGE_TYPE=mem           # In-memory storage (data lost on restart)
    depends_on:
      - eureka-server              # Start after Eureka server

  # 🔹 Eureka Server (Service Discovery)
  eureka-server:
    build: ./eureka-server         # Build from local project folder
    container_name: eureka-server
    ports:
      - "8761:8761"                # Eureka dashboard (http://localhost:8761)
    depends_on:
      - mysql                      # Depends on DB

  # 🔹 API Gateway (Entry point for all requests)
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"                # Gateway runs on port 8090
    depends_on:
      - eureka-server              # Must connect to Eureka
    environment:
      SERVER_PORT: 8090
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PORT: 8090
      EUREKA_INSTANCE_NONSECUREPORT: 8090

  # 🔹 Auth Service (Authentication & JWT)
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db  
      # Connects to mysql container (NOT localhost)
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8081
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_PORT: 8081
      EUREKA_INSTANCE_NONSECUREPORT: 8081

  # 🔹 Delivery Service (Handles deliveries)
  delivery-service:
    build: ./delivery-service
    container_name: delivery-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq                   # ✅ Needs RabbitMQ for messaging
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delivery_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq   # ✅ Connect to RabbitMQ container
      SERVER_PORT: 8082
      EUREKA_INSTANCE_HOSTNAME: delivery-service
      EUREKA_INSTANCE_PORT: 8082
      EUREKA_INSTANCE_NONSECUREPORT: 8082

  # 🔹 Tracking Service (Tracks delivery updates)
  tracking-service:
    build: ./tracking-service
    container_name: tracking-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq                   # ✅ Consumes messages
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tracking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq   # ✅ Reads from queue
      SERVER_PORT: 8083
      EUREKA_INSTANCE_HOSTNAME: tracking-service
      EUREKA_INSTANCE_PORT: 8083
      EUREKA_INSTANCE_NONSECUREPORT: 8083

  # 🔹 Admin Service (Admin operations)
  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/admin_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8084
      EUREKA_INSTANCE_HOSTNAME: admin-service
      EUREKA_INSTANCE_PORT: 8084
      EUREKA_INSTANCE_NONSECUREPORT: 8084

  # 🔹 SonarQube Database (PostgreSQL)
  sonarqube-db:
    image: postgres:13
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data  
      # ✅ Persistent storage for Sonar DB

  # 🔹 SonarQube (Code quality tool)
  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    ports:
      - "9000:9000"                # Access SonarQube UI
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      - sonarqube-db              # Needs DB first
    volumes:
      - sonarqube_data:/opt/sonarqube/data         # Data storage
      - sonarqube_extensions:/opt/sonarqube/extensions  # Plugins
      - sonarqube_logs:/opt/sonarqube/logs         # Logs

# 🔹 Named Volumes (Persistent storage)
volumes:
  mysql_data:                # Stores MySQL data
  sonarqube_db_data:         # Stores PostgreSQL data
  sonarqube_data:            # SonarQube internal data
  sonarqube_extensions:      # Plugins/extensions
  sonarqube_logs:            # Logs