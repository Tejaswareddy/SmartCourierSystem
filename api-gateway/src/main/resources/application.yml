server:
  port: 8090

spring:
  application:
    name: apigateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: delivery-service
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/api/deliveries/**

        - id: tracking-service
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/api/tracking/**

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/api/admin/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/